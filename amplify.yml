version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - test -n "$BOLHATECH_API_BASE_URL" || (echo "BOLHATECH_API_BASE_URL is required in Amplify environment variables." && exit 1)
    build:
      commands:
        - env | grep -e BOLHATECH_API_BASE_URL -e NEXT_PUBLIC_BOLHATECH_API_BASE_URL >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*