name: Frontend Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: frontend-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AMPLIFY_APP_ID: ${{ vars.FRONTEND_AMPLIFY_APP_ID }}
      AMPLIFY_BRANCH: ${{ vars.FRONTEND_AMPLIFY_BRANCH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Validate deploy inputs
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION is required in GitHub Variables."
            exit 1
          fi

          if [ -z "$AMPLIFY_APP_ID" ]; then
            echo "FRONTEND_AMPLIFY_APP_ID is required in GitHub Variables."
            exit 1
          fi

          if [ -z "$AMPLIFY_BRANCH" ]; then
            echo "FRONTEND_AMPLIFY_BRANCH is required in GitHub Variables."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.FRONTEND_AWS_DEPLOY_ROLE_ARN != '' && secrets.FRONTEND_AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Trigger Amplify deploy
        id: amplify_start
        run: |
          JOB_JSON=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type RELEASE)

          echo "$JOB_JSON"
          JOB_ID=$(echo "$JOB_JSON" | jq -r '.jobSummary.jobId')
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for Amplify deploy completion
        run: |
          JOB_ID="${{ steps.amplify_start.outputs.job_id }}"

          if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
            echo "Could not get Amplify job id"
            exit 1
          fi

          for _ in {1..60}; do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' \
              --output text)

            echo "Amplify job status: $STATUS"

            case "$STATUS" in
              SUCCEED)
                exit 0
                ;;
              FAILED|CANCELLED)
                echo "Amplify deploy failed with status $STATUS"
                aws amplify get-job \
                  --app-id "$AMPLIFY_APP_ID" \
                  --branch-name "$AMPLIFY_BRANCH" \
                  --job-id "$JOB_ID"
                exit 1
                ;;
              *)
                sleep 20
                ;;
            esac
          done

          echo "Timed out waiting for Amplify deploy"
          exit 1
